# Default values for digiusher-k8s-agent.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

#########################################
# Global configs
#########################################
global:
  environment:
    dev:
      enabled: false
  # Flip to true to pull the private *-dev images (CI workflow_dispatch builds)
  # instead of the public prod ones. When true, populate global.imagePullSecrets
  # with a secret that can authenticate to ghcr.io and override the per-service
  # image.devTag with a real SHA (the *-dev packages don't carry a `latest` tag).
  useDevImages: false
  imagePullSecrets: []

#########################################
# Service Account
#########################################
serviceAccount:
  create: true
  automount: true
  annotations: {}
  # Leave empty to derive from the release name (recommended). Set explicitly
  # only if you need to bind to a pre-existing ServiceAccount.
  name: ""

#########################################
# Agent — the collapsed Go binary that receives Prometheus remote_write from
# vmagent, aggregates in memory, snapshots to PV for crash recovery, builds
# parquet at window close, and uploads via pre-signed S3 URL.
#########################################
agent:
  enabled: true
  containerName: digiusher-k8s-agent
  image:
    repository: ghcr.io/digiusher/digiusher-k8s-agent
    devRepository: ghcr.io/digiusher/digiusher-k8s-agent-dev
    pullPolicy: IfNotPresent
    # Pin to a published SemVer tag in production so installs are reproducible
    # across image pushes. The default below is a placeholder; override per
    # release.
    tag: "latest"
    # Required when global.useDevImages=true. The *-dev package has no `latest`
    # tag, so this must be set to a SHA via --set agent.image.devTag=<sha>.
    devTag: ""
  service:
    # The agent's governing Service is headless; `type` is present for parity
    # with the other components in this chart and is otherwise ignored.
    type: ClusterIP
    port: 8111
  persistence:
    enabled: true
    # Scale up for high series cardinality or extended outage tolerance —
    # vmagent's WAL covers short outages, but the agent's PV-resident parquet
    # retention window is what survives longer ones.
    size: 20Gi
    storageClassName: ""
    mountPath: /var/lib/digiusher-agent/pending
  # Memory scales with active series count (~750 bytes/series).
  # 1Gi covers clusters up to ~1000 nodes.
  # Increase to 2Gi for larger clusters or if OOMKilled events appear.
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  env:
    # Required — provided by the DigiUsher team. Secret only renders when this
    # is non-empty; the agent fails fast on startup if the env var is missing.
    digiusher_k8s_api_token: ""
    digiusher_k8s_api_url: "https://app.digiusher.com/api/v3"
    log_level: "info"
  # Raw `env:` entries for advanced overrides (e.g., SNAPSHOT_TICK_SECONDS,
  # UPLOAD_TICK_SECONDS, MAX_REQUEST_BYTES). The agent's built-in defaults
  # are correct for this chart's design ceilings; override only when needed.
  extraEnv: []
  # Distroless `nonroot` (UID 65532).
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
    fsGroup: 65532
    runAsNonRoot: true
    runAsUser: 65532
  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
  startupProbe:
    httpGet:
      path: /readyz
      port: http
    periodSeconds: 10
    failureThreshold: 18
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 1
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  podAnnotations: {}
  nodeSelector: {}
  tolerations:
    - key: "digiusher-k8s"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  affinity: {}

#########################################
# vmagent (VictoriaMetrics agent) configurations
#
# vmagent runs as a single Deployment that scrapes KSM + every kubelet's
# /metrics/cadvisor and /metrics endpoints (via Kubernetes service discovery),
# then remote_writes to the in-cluster agent Service.
#########################################
vmagent:
  enabled: true
  image:
    repository: victoriametrics/vmagent
    tag: "v1.143.0"
    pullPolicy: IfNotPresent
  # Per-job scrape intervals. Defaults are 60s across the board to keep the
  # downstream sample rate comfortable for typical clusters.
  #
  # Tighten cAdvisor specifically if your workloads include many short-lived
  # pods (jobs, scaling churn) — at 60s a 15-second pod has only ~25% chance
  # of being captured in a scrape; at 20s the capture probability is ~75%.
  # vmagent's own footprint is series-driven, not scrape-rate-driven, so a
  # lower cAdvisor interval barely moves the scraper's memory or CPU.
  #
  # KSM and kubelet rarely benefit from sub-60s scraping; the API server is
  # the bottleneck for KSM, and storage capacity changes slowly.
  intervals:
    ksm: "60s"
    cadvisor: "60s"
    kubelet: "60s"
  # Disk usage cap for vmagent's remote_write retry queue per remote_write URL.
  # vmagent buffers samples here when the agent is unreachable; size this to
  # cover the longest acceptable outage window.
  maxDiskUsagePerURL: "20GB"
  persistence:
    enabled: true
    size: 30Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
    fsGroup: 65534
    runAsNonRoot: true
    runAsUser: 65534
  securityContext:
    capabilities:
      drop:
        - ALL
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
  nodeSelector: {}
  tolerations:
    - key: "digiusher-k8s"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  affinity: {}

#########################################
# Kube State Metrics configurations
#########################################
kube-state-metrics:
  extraArgs:
    - "--metric-labels-allowlist=pods=[*],nodes=[*],services=[selector],resourcequotas=[*],jobs=[*],namespaces=[*],endpoints=[*]"
  podLabels:
    owner: digiusher-k8s
    component: external
