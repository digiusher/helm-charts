apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.alloy.alloy.configMap.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "digiusher-k8s-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: alloy
data:
  config.alloy: |
    {{- tpl (.Files.Get "alloy-config.yaml") . | trim | nindent 4 }}