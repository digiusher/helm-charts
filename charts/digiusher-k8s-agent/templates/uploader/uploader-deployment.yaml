{{- if .Values.uploader.enabled }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "digiusher-k8s-agent.uploader.fullname" . }}
  labels:
    {{- include "digiusher-k8s-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: uploader
spec:
  {{- if not .Values.uploader.autoscaling.enabled }}
  replicas: {{ .Values.uploader.replicaCount }}
  {{- end }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "digiusher-k8s-agent.uploader.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.uploader.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "digiusher-k8s-agent.uploader.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "digiusher-k8s-agent.serviceAccountName" . }}
      {{- with .Values.uploader.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.uploader.containerName }}
          {{- with .Values.uploader.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ include "digiusher-k8s-agent.image" (dict "image" .Values.uploader.image "global" .Values.global) }}"
          imagePullPolicy: {{ .Values.uploader.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "digiusher-k8s-agent.uploader.fullname" . }}
          env:
            - name: K8S_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "digiusher-k8s-agent.apiToken.secretName" . }}
                  key: K8S_API_TOKEN
          {{- with .Values.uploader.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.uploader.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.uploader.resources }} 
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.uploader.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.uploader.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.uploader.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.uploader.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.uploader.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- end }}